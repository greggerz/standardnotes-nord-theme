name: Build SCSS, Sync Version, and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      # Extract version from package.json
      - name: Get version from package.json
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # Update ext.json with the version and other relevant fields
      - name: Update ext.json
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          DOWNLOAD_URL="https://github.com/greggerz/standardnotes-nord-theme/releases/download/v${VERSION}/dist-v${VERSION}.zip"

          jq --arg ver "$VERSION" --arg url "$DOWNLOAD_URL" \
             '.version = $ver | .download_url = $url' \
             ext.json > ext.json.tmp && mv ext.json.tmp ext.json

      # Compile SCSS to CSS
      - name: Compile SCSS
        run: |
          npm run build

      # Copy files to dist folder for deployment
      - name: Copy files to dist
        run: |
          cp ext.json dist/
          cp package.json dist/

      # The Release: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Package Build Output
        run: |
          zip -r dist-v${{ steps.get_version.outputs.version }}.zip dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            Automated release for version ${{ steps.get_version.outputs.version }}.
            
            Includes:
            - Compiled CSS
            - Updated ext.json
            
            Generated by GitHub Actions.
          files: |
            dist-v${{ steps.get_version.outputs.version }}.zip
          draft: false
          prerelease: false
